columns:
  required:
    external_id:
      names: ["Volgnummer"]
      filter_regex: "^[0-9]{4}-[0-9]+$"

    primary_transaction_date:
      names: ["Uitvoeringsdatum"]
      regex: "^[0-9]{2}/[0-9]{2}/[0-9]{4}$"

    booking_date:
      names: ["Valutadatum"]
      regex: "^[0-9]{2}/[0-9]{2}/[0-9]{4}$"

    amount:
      names: ["Bedrag"]
      regex: "^-?[0-9]+([.,][0-9]+)?$"

    account_currency_code:
      names: ["Valuta rekening"]
      regex: "^.+$"

    asset_account_iban:
      names: ["Rekeningnummer"]
      regex: "^[A-Z]{2}[0-9A-Z]{13,30}$"

    transaction_type:
      names: ["Type verrichting"]

    opposing_account_iban:
      names: ["Tegenpartij"]

    opposing_account_name:
      names: ["Naam van de tegenpartij"]

    description:
      names: ["Mededeling"]

    details:
      names: ["Details"]

    status:
      names: ["Status"]
      filter: ["Geaccepteerd"]

  optional:
    reject_reason:
      names: ["Reden van weigering"]

duplicate_key:
  columns: ["external_id"]
  partition_by: "asset_account_iban"
